name: Publish

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          # - goos: windows
          #   goarch: amd64
          # - goos: windows
          #   goarch: arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.24.x'
      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail

          binary=rodney
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          elif [ "$GOOS" = "js" ] || [ "$GOOS" = "wasip1" ]; then
            ext=".wasm"
          fi

          suffix="$GOOS-$GOARCH"
          if [ -n "$GOARM" ]; then
            suffix="${suffix}v${GOARM}"
          fi

          version="${GITHUB_REF_NAME#v}"
          outdir="dist/${binary}-${suffix}"
          mkdir -p "$outdir"

          env GOOS="$GOOS" GOARCH="$GOARCH" GOARM="$GOARM" CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w -X main.version=${version}" -o "$outdir/${binary}${ext}" .

          if [ "$GOOS" = "windows" ]; then
            (cd "$outdir" && zip -9 "../${binary}-${suffix}.zip" "${binary}${ext}")
          else
            tar -C "$outdir" -czf "dist/${binary}-${suffix}.tar.gz" "${binary}${ext}"
          fi
      - name: Check version flag
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          set -euo pipefail
          uname -m
          version="${GITHUB_REF_NAME#v}"
          dist_bin="dist/rodney-linux-amd64/rodney"
          "$dist_bin" --version | grep -Fx "$version"
      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: rodney-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          path: dist
          merge-multiple: true
      - name: Upload release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
