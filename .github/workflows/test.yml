name: Go tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.24'
      - name: Build
        run: go build -o rodney${{ matrix.os == 'windows-latest' && '.exe' || '' }} .
      - name: Check version flag
        run: ./rodney${{ matrix.os == 'windows-latest' && '.exe' || '' }} --version
